# DIMELA.mx — Cloudflare Worker + static assets

name = "dimela-mx"
compatibility_date = "2025-09-07"
main = "worker.js"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Run Worker first so /api/* hits the Worker before static files
run_worker_first = true
