# DIMELA.mx — Cloudflare Worker + static assets

name = "dimela-mx"
compatibility_date = "2025-09-07"
main = "worker.js"
workers_dev = true

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "404-page"
# Run Worker first so /api/* hits the Worker before static files
run_worker_first = true

[[d1_databases]]
binding = "DB"
database_name = "dimela-mx"
database_id = "4b237d4d-ca9f-4304-b1f8-6c8353cb1b53"

# Profile images (cover / avatar). Enable R2 in Dashboard, then:
#   npx wrangler r2 bucket create dimela-mx-media
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "dimela-mx-media"

# Magic-link email (Cloudflare Email Sending). Enable with:
#   npx wrangler email sending enable dimela.mx
# Set secret: wrangler secret put MAGIC_LINK_FROM  (e.g. hola@dimela.mx)
[[send_email]]
name = "EMAIL"

# Beta / tester tools on workers.dev (Entrar demos). Turn off for public launch.
# Full checklist: docs/beta-launch.md
[vars]
BETA_LOGIN = "true"

# Preview: profile-tags branch → https://tags.dimela.mx
# Deploy from cursor/profile-tags: npm run deploy:tags
# Creates Worker script dimela-mx-tags; shares prod D1 + R2 (tags column is additive).
[env.tags]
name = "dimela-mx-tags"
workers_dev = true

[[env.tags.routes]]
pattern = "tags.dimela.mx"
custom_domain = true

[[env.tags.d1_databases]]
binding = "DB"
database_name = "dimela-mx"
database_id = "4b237d4d-ca9f-4304-b1f8-6c8353cb1b53"

[[env.tags.r2_buckets]]
binding = "MEDIA"
bucket_name = "dimela-mx-media"

[[env.tags.send_email]]
name = "EMAIL"

[env.tags.vars]
BETA_LOGIN = "true"
